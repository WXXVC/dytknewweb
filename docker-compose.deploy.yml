services:
  newweb-backend:
    image: ${BACKEND_IMAGE:-ghcr.io/wxxvc/dytknewweb-backend}:${IMAGE_TAG:-latest}
    container_name: newweb-backend
    restart: unless-stopped
    environment:
      NEWWEB_DATA_DIR: /app/data
      ENGINE_VOLUME_PATH: /app/Volume
      ENGINE_API_BASE: ${ENGINE_API_BASE:-http://host.docker.internal:5555}
      ENGINE_API_TOKEN: ${ENGINE_API_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ENGINE_VOLUME_HOST_PATH:-/ddata/tkdown}:/app/Volume
      - ${NEWWEB_DATA_HOST_PATH:-/ddata/tkdown/newweb}:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - newweb_bridge

  newweb-frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/wxxvc/dytknewweb-frontend}:${IMAGE_TAG:-latest}
    container_name: newweb-frontend
    restart: unless-stopped
    depends_on:
      - newweb-backend
    ports:
      - "${FRONTEND_PORT:-4173}:80"
    networks:
      - newweb_bridge

networks:
  newweb_bridge:
    driver: bridge
